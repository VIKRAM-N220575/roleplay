name: Website Test CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-website:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Validate HTML Files
        run: htmlhint "**/*.html"

      - name: Check JavaScript Syntax
        run: |
          for file in *.js; do
            node --check "$file"
          done

      - name: CI Completed
        run: echo "✅ Website code passed CI checks"